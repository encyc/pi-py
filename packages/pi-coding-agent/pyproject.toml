[project]
name = "pi-coding-agent"
version = "0.81.1"
description = "Python port of @earendil-works/pi-coding-agent — Coding agent SDK (no TUI)"
readme = "README.md"
license = { file = "../../LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Justin Gao" }]
dependencies = [
    "pi-ai",
    "pi-agent-core",
    "pydantic>=2.7",
    "pyyaml>=6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_coding_agent"]
