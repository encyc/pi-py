[project]
name = "pi-server"
version = "0.81.1"
description = "Python port of @earendil-works/pi-server — Experimental agent server (RPC/IPC)"
readme = "README.md"
license = { file = "../../LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Justin Gao" }]
dependencies = [
    "pi-coding-agent",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_server"]
