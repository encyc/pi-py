[project]
name = "pi-storage-sqlite"
version = "0.81.1"
description = "Python port of @earendil-works/pi-storage-sqlite-node — SQLite session storage backend"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Justin Gao" }]
dependencies = [
    "pi-ai>=0.81.1,<0.82",
    "pi-agent-core>=0.81.1,<0.82",
]

classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Intended Audience :: Developers",
]

[project.urls]
Homepage = "https://github.com/encyc/pi-py"
Repository = "https://github.com/encyc/pi-py"
Issues = "https://github.com/encyc/pi-py/issues"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_storage_sqlite"]

[tool.hatch.build.targets.wheel.force-include]
"src/pi_storage_sqlite/migrations.sql" = "pi_storage_sqlite/migrations.sql"
