[project]
name = "pi-storage-sqlite"
version = "0.81.1"
description = "Python port of @earendil-works/pi-storage-sqlite-node — SQLite session storage backend"
readme = "README.md"
license = { file = "../../LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Justin Gao" }]
dependencies = [
    "pi-ai",
    "pi-agent-core",
    # 使用 stdlib sqlite3，无外部依赖
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pi_storage_sqlite"]
