name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # 手动触发

permissions:
  id-token: write  # OIDC Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build all packages
        run: |
          uv build --package pi-ai
          uv build --package pi-agent-core
          uv build --package pi-storage-sqlite
          uv build --package pi-coding-agent
          uv build --package pi-server

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
